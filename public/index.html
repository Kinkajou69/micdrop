<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicDrop Conference</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="bg"></div>
    <canvas id="gl"></canvas>

    <div id="nav-trigger" class="hamburger-container">
        <div class="hamburger-bar"></div>
        <div class="hamburger-bar"></div>
        <div class="hamburger-bar"></div>
    </div>

    <div id="side-nav" class="glass-nav">
        <div class="nav-content">
            <div class="status-panel">
                <h3>SYSTEM STATUS</h3>
                <div id="mic-status-indicator" class="mic-status-pill mic-off">
                    <div class="status-dot"></div>
                    <span id="mic-status-text">MIC: DISCONNECTED</span>
                </div>
            </div>
            <div class="nav-links">
                <p>MicDrop v1.2</p>
                <button class="text-btn" onclick="location.reload()">Reset Session</button>
            </div>
            <div class="nav-credit">
                <p>Developed by</p>
                <p class="nav-credit-name">Reyansh Sawant</p>
            </div>
        </div>
    </div>

    <div id="audio-gate" class="hidden">
        <div class="glass-card">
            <p>Incoming Audio Ready</p>
            <button id="btn-unlock-audio" class="primary-btn bouncy">Tap to Hear Speaker</button>
        </div>
    </div>

    <div class="glass-container" id="main-card">
        <header>
            <h1>MicDrop</h1>
            <div id="status-bar" class="hidden">
                <span id="room-display"></span> | <span id="role-display"></span>
            </div>
        </header>

        <div id="view-landing" class="view">
            <button id="btn-start" class="primary-btn bouncy">Start Conference (Host)</button>
            <button id="btn-join" class="secondary-btn bouncy">Join Conference (Guest)</button>
        </div>

        <div id="view-join" class="view hidden">
            <input type="text" id="input-name" placeholder="Display Name" />
            <input type="text" id="input-code" placeholder="6-Digit Code" maxlength="6" />
            <button id="btn-enter" class="primary-btn bouncy">Enter Room</button>
            <button id="btn-back" class="text-btn">Back</button>
        </div>

        <div id="view-moderator" class="view hidden">
            <h3>Live Attendees</h3>
            <div id="attendee-list" class="list-container"></div>
            <audio id="remote-audio" autoplay playsinline></audio>
            <div id="qr-code"></div>
            <p class="qr-label">Scan to join</p>
        </div>

        <div id="view-attendee" class="view hidden">
            <div class="status-card">
                <p id="attendee-status-text">Ready to ask a question?</p>
            </div>
            <button id="btn-raise-hand" class="primary-btn pulse-btn bouncy">✋ Raise Hand</button>
            <button id="btn-stop-talking" class="danger-btn hidden bouncy">Stop Talking</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function () {
        const canvas = document.getElementById('gl');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }`;

        const fragmentShader = `
            precision highp float;
            varying vec2 vUv;
            uniform vec2 uResolution;
            uniform vec2 uGlassCenter;
            uniform vec2 uGlassSize;
            uniform float uRadius;
            uniform float uBezel;
            uniform float uThickness;
            uniform float uIOR;
            uniform float uBlur;
            uniform float uSpecular;
            uniform float uTint;
            uniform sampler2D uBgTex;
            uniform float uBgAspect;

            float sdRoundedRect(vec2 p, vec2 halfSize, float r) {
                vec2 q = abs(p) - halfSize + r;
                return min(max(q.x, q.y), 0.0) + length(max(q, 0.0)) - r;
            }

            float surfaceHeight(float t) {
                float s = 1.0 - t;
                return pow(1.0 - s*s*s*s, 0.25);
            }

            vec3 sampleBg(vec2 screenUV) {
                float screenAspect = uResolution.x / uResolution.y;
                vec2 uv = screenUV;
                if (uBgAspect > screenAspect) {
                    float s = screenAspect / uBgAspect;
                    uv.x = uv.x * s + (1.0 - s) * 0.5;
                } else {
                    float s = uBgAspect / screenAspect;
                    uv.y = uv.y * s + (1.0 - s) * 0.5;
                }
                uv.y = 1.0 - uv.y;
                return texture2D(uBgTex, uv).rgb;
            }

            vec3 sampleBgBlurred(vec2 uv, float radius) {
                if (radius < 0.5) return sampleBg(uv);
                vec3 sum = vec3(0.0);
                vec2 px = 1.0 / uResolution;
                vec2 offsets[16];
                offsets[0]  = vec2(-0.94201, -0.39906); offsets[1]  = vec2( 0.94558, -0.76890);
                offsets[2]  = vec2(-0.09418, -0.92938); offsets[3]  = vec2( 0.34495,  0.29387);
                offsets[4]  = vec2(-0.91588, -0.45771); offsets[5]  = vec2(-0.81544,  0.48568);
                offsets[6]  = vec2(-0.38277, -0.56071); offsets[7]  = vec2(-0.12675,  0.84686);
                offsets[8]  = vec2( 0.89642,  0.41254); offsets[9]  = vec2( 0.18150, -0.30020);
                offsets[10] = vec2(-0.01445, -0.16001); offsets[11] = vec2( 0.59614,  0.71118);
                offsets[12] = vec2( 0.49742, -0.47280); offsets[13] = vec2( 0.80685,  0.04588);
                offsets[14] = vec2(-0.32490, -0.03965); offsets[15] = vec2(-0.60975,  0.06566);
                for (int i = 0; i < 16; i++) {
                    sum += sampleBg(uv + offsets[i] * radius * px);
                }
                return sum / 16.0;
            }

            void main() {
                vec2 screenPx = vec2(vUv.x, 1.0 - vUv.y) * uResolution;
                vec2 p = screenPx - uGlassCenter;
                vec2 halfSize = uGlassSize * 0.5;
                float sd = sdRoundedRect(p, halfSize, uRadius);

                if (sd > 0.0) {
                    gl_FragColor = vec4(0.0, 0.0, 0.0, 0.0);
                    return;
                }

                float distFromEdge = -sd;
                float bezel = min(uBezel, min(uRadius, min(halfSize.x, halfSize.y)) - 1.0);
                float t = clamp(distFromEdge / bezel, 0.0, 1.0);
                float h = surfaceHeight(t);
                float dt = 0.001;
                float h2 = surfaceHeight(min(t + dt, 1.0));
                float dh = (h2 - h) / dt;

                float slopeAngle = atan(dh * (uThickness / bezel));
                float sinR = sin(slopeAngle) / uIOR;
                float thetaR = asin(clamp(sinR, -1.0, 1.0));
                float displacement = h * uThickness * (tan(slopeAngle) - tan(thetaR));

                vec2 grad;
                float eps = 0.5;
                grad.x = sdRoundedRect(p + vec2(eps, 0.0), halfSize, uRadius) - sd;
                grad.y = sdRoundedRect(p + vec2(0.0, eps), halfSize, uRadius) - sd;
                grad = normalize(grad);

                vec2 offset = -grad * displacement / uResolution;
                vec2 refractedUV = (screenPx / uResolution) + offset;

                vec3 color = sampleBgBlurred(refractedUV, uBlur);
                
                float spec = pow(max(dot(grad, normalize(vec2(0.5, 0.5))), 0.0), 10.0);
                color += vec3(spec * 0.2 * uSpecular);

                color = mix(color, vec3(1.0), uTint);
                gl_FragColor = vec4(color, 1.0);
            }`;

        const material = new THREE.ShaderMaterial({
            vertexShader, fragmentShader,
            uniforms: {
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                uGlassCenter: { value: new THREE.Vector2(0, 0) },
                uGlassSize:   { value: new THREE.Vector2(420, 300) },
                uRadius:      { value: 28 },
                uBezel:       { value: 55 },
                uThickness:   { value: 60 },
                uIOR:         { value: 2.8 },
                uBlur:        { value: 1.5 },
                uSpecular:    { value: 0.7 },
                uTint:        { value: 0.04 },
                uBgTex:       { value: null },
                uBgAspect:    { value: 1.5 },
            },
            transparent: true,
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

        new THREE.TextureLoader().load('micdropbackground.jpg', (tex) => {
            tex.minFilter = THREE.LinearFilter;
            material.uniforms.uBgTex.value = tex;
            material.uniforms.uBgAspect.value = tex.image.width / tex.image.height;
        });

        function syncGlass() {
            const card = document.getElementById('main-card');
            if (!card) return;
            const rect = card.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            material.uniforms.uGlassCenter.value.set(cx, window.innerHeight - cy);
            material.uniforms.uGlassSize.value.set(rect.width, rect.height);
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        }

        function render() {
            syncGlass();
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }
        render();

        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w, h);
            material.uniforms.uResolution.value.set(w, h);
        }
        window.addEventListener('resize', onResize);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', onResize);
            window.visualViewport.addEventListener('scroll', syncGlass);
        }
    })();
    </script>
    <script src="script.js"></script>
</body>
</html>
